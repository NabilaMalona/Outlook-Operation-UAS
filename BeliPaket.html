<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutLook Operation</title>
    <link rel="stylesheet" href="CSS/belipaket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 600px;
        margin: auto;
    }

    .card {
        background: #e9ebef;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .card h3 {
        margin: 0 0 10px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin: 8px 0;
    }

    .total {
        border-top: 1px solid #ccc;
        margin-top: 10px;
        padding-top: 10px;
        font-weight: bold;
    }

    .section-title {
        font-size: 20px;
        font-weight: bold;
        margin: 20px 0 10px;
    }

    .info-box {
        background: #d6e4ff;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
    }

    .payment-item {
        background: #fff;
        border-radius: 10px;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #ddd;
        cursor: pointer;
    }

    .payment-item img {
        width: 40px;
        height: auto;
    }

    .buy-btn {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        border: 2px solid #000;
        border-radius: 10px;
        background: transparent;
        cursor: pointer;
        transition: 0.3s;
    }

    .buy-btn:hover {
        background: #000;
        color: #fff;
    }

    body {
        font-family: Arial;
        background: #f5f6f8;
        padding: 20px;
    }

    .card {
        background: #e9ebef;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
    }

    .total {
        border-top: 1px solid #ccc;
        margin-top: 10px;
        padding-top: 10px;
        font-weight: bold;
    }

    button {
        width: 100%;
        padding: 12px;
        border: 2px solid black;
        background: transparent;
        margin-top: 15px;
        cursor: pointer;
    }
</style>
</head>
<body>
    <header class="navbar">
            <a href="index.html">
            <img src="OutLook Logo.png" alt="Logo" style="height: 75px;">
            </a>
            <div>
                Tempat belajar online<br>
                yang bikin cerdas beneran
            </div>
            <input type="checkbox" id="nav-Toggle" class="nav-Toggle">
            <label for="nav-Toggle" class="navToggleMenu">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <div class="container">

    <!-- Order Summary -->
        <div class="card">
        <h3>Order Summary</h3>

        <div class="row">
            <span id="paketText"></span>
            <span id="harga"></span>
        </div>

        <div class="row">
            <span>Masa aktif sampai</span>
            <span id="expired"></span>
        </div>

        <div class="row total">
            <span>Total</span>
            <span id="total"></span>
        </div>

            <!-- Pembayaran -->
            <div class="section-title">Bayarnya pake apa?</div>
            <p>Transfer Virtual Account</p>

            <div class="grid">
                <div class="payment-item">BCA VA</div>
                <div class="payment-item">Mandiri VA</div>
                <div class="payment-item">BNI VA</div>
                <div class="payment-item">BRI VA</div>
                <div class="payment-item">CIMB VA</div>
            </div>

            <!-- Button -->
            <button class="buy-btn">Beli</button>

        </div>

<script>
    // Ambil parameter URL
    const urlParams = new URLSearchParams(window.location.search);
    const paket = parseInt(urlParams.get("paket"));

    // Data paket
    const data = {
        1: { harga: 175000, hari: 30 },
        3: { harga: 225000, hari: 90 },
        6: { harga: 335000, hari: 180 },
        9: { harga: 425000, hari: 270 },
        12:{ harga: 450000, hari: 360 }
    };

    // Validasi
    if (!data[paket]) {
        document.body.innerHTML = "<h2>Paket tidak ditemukan</h2>";
    }

    // Ambil data
    const harga = data[paket].harga;
    const hari = data[paket].hari;

    // Hitung tanggal akhir
    let today = new Date();
    let expired = new Date();
    expired.setDate(today.getDate() + hari);

    // Format tanggal Indonesia
    const options = { day: 'numeric', month: 'long', year: 'numeric' };

    // Tampilkan
    document.getElementById("paketText").innerText = `Langganan ${paket} bulan`;
    document.getElementById("harga").innerText = `Rp${harga.toLocaleString()}`;
    document.getElementById("total").innerText = `Rp${harga.toLocaleString()}`;
    document.getElementById("expired").innerText = expired.toLocaleDateString("id-ID", options);
</script>

</div>

</body>
</html>
