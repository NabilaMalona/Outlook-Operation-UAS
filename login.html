<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OutLook Operation</title>

    <link rel="stylesheet" href="CSS/login.css">

    <!-- Font sama seperti web utama -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="navbar">
        <a href="index.html" class="logo">OutLook <span>Operation</span></a>
    </header>

    <!-- LOGIN SECTION -->
    <main class="login-wrapper">
        <div class="login-box">
            <h2>🔐 Login</h2>
            <p>Masuk untuk lanjut belajar</p>

            <form>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="Email" placeholder="Masukkan Email">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan password" required>
                </div>

                <button onclick="login()">Login</button>
            </form>

            <div class="extra">
                <p>Belum punya akun? <a href="SignUp.html">Daftar</a></p>
                <p><a href="#">Lupa password?</a></p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 OutLook Operation</p>
    </footer>
<script src="proses.js"></script>
</body>
</html>
