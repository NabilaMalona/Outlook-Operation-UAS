<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OutLook Operation</title>
    <link rel="stylesheet" href="CSS/signup.css">

    <!-- Font sama -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar">
        <a href="index.html">
            <img src="OutLook Logo.png" alt="Logo" style="height: 75px;">
        </a>
    </header>

    <!-- SIGN UP -->
    <main class="signup-wrapper">
        <div class="signup-box">
            <h2>📝 Daftar Akun</h2>
            <p>Buat akun untuk mulai belajar</p>

            <form onsubmit="daftar(event)">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="Nama" placeholder="Masukkan Nama">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="Email" placeholder="Masukkan Email">
                </div>
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <div class="birthday-group">
                        <input type="number" id="TglLahir" placeholder="Tanggal" min="1" max="31">
                        <input type="number" id="BulanLahir" placeholder="Bulan" min="1" max="12">
                        <input type="number" id="TahunLahir" placeholder="Tahun" min="1900" max="2025">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan password" required>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" placeholder="Ulangi password" required>
                </div>

                <button type="submit">Daftar</button>
            </form>

            <div class="extra">
                <p>Sudah punya akun? <a href="login.html">Login</a></p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 OutLook Operation</p>
    </footer>
    <script src="javascript/proses.js"></script>
</body>

</html>
